<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kontakt · Seyfor (prototyp, stav k 1.1.2027)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Hlavicka -->
<header class="site-head">
  <img class="site-head__logo" src="assets/seyfor-logo-white.png" alt="Seyfor"
       onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'SEYFOR',style:'color:#fff;font-weight:700;letter-spacing:2px;font-size:20px'}))">
  <span class="site-head__claim">Prototyp kontaktní sekce · cílový stav k 1.1.2027</span>
</header>

<main class="wrap">

  <section class="hero">
    <h1>Jak vám můžeme pomoci?</h1>
    <p>Vyberte subjekt skupiny Seyfor, kterého se váš dotaz týká. Podle volby vám ukážeme správný kontakt i smluvní stranu.</p>
  </section>

  <!-- HIERARCHIE SUBJEKTU (jen CZ) -->
  <section class="subjects" aria-label="Subjekty skupiny Seyfor">

    <!-- PRIMARNI: hero karta -->
    <button class="subject subject--primary" id="subjPrimary" data-tier="primary">
      <span class="subject__accent" aria-hidden="true"></span>
      <span class="subject__icon" data-icon="solutions" aria-hidden="true"></span>
      <span class="subject__text">
        <span class="subject__kicker">Hlavní vstup</span>
        <span class="subject__name"></span>
        <span class="subject__label"></span>
        <span class="subject__desc"></span>
      </span>
      <span class="subject__cta-hint">Zobrazit kontakt
        <span class="subject__arrow" data-icon="arrow" aria-hidden="true"></span>
      </span>
    </button>

    <!-- SEKUNDARNI: dve stredni karty -->
    <div class="subjects__secondary" id="subjSecondary"></div>

    <!-- TERCIARNI: seskupeny blok -->
    <div class="subjects__tertiary-wrap">
      <p class="subjects__group-label">Další značky skupiny</p>
      <div class="subjects__tertiary" id="subjTertiary"></div>
    </div>
  </section>

  <!-- Vystupni panel: kontaktni karta -->
  <section class="panel" id="panel" aria-live="polite"></section>

</main>

<!-- Paticka — most znacka -> firma -->
<footer class="site-foot">
  <div class="site-foot__inner">
    <div class="site-foot__provider" id="footProvider">
      Provozovatel webu: <strong>Seyfor, a. s.</strong>
    </div>
    <img src="assets/seyfor-logo-white.png" alt="Seyfor"
         onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'SEYFOR',style:'color:#fff;font-weight:700;letter-spacing:2px'}))">
  </div>
  <!-- Ticha pravni disambiguacni veta (Deloitte-style). PLACEHOLDER zneni —
       finalni copy dotahne Ridley. Konkretni firma + ICO se cerpa z lookup dat. -->
  <p class="site-foot__legal" id="footLegal"></p>
</footer>

<!-- Modal: poptavkovy formular (moment pravdy) -->
<div class="modal-backdrop" id="modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal__head">
      <h3 id="modalTitle">Nezávazná poptávka</h3>
      <button class="modal__close" id="modalClose" aria-label="Zavřít">&times;</button>
    </div>
    <div class="modal__body" id="modalBody"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
/* =======================================================================
   Seyfor kontaktni sekce — aplikacni logika prototypu (CZ only)
   Vizualni hierarchie subjektu: primarni / sekundarni / terciarni.
   Vse cte z window.SEYFOR_DATA (data.js). Zadny hardcode udaju zde.
   ======================================================================= */
(function () {
  const D = window.SEYFOR_DATA;
  const H = D.HIERARCHY;
  const POWERED = '<span class="powered"><span class="powered__dot" aria-hidden="true"></span>Powered by Seyfor</span>';

  /* ---- PLACEHOLDER copy (finalni zneni dotahne Ridley, K-CRE) -----------
     Ulric resi umisteni / vahu / styl, ne finalni slova. */
  const COPY = {
    // endorsement na terciarnich brandech (Visma-style "part of")
    endorse: "Součást skupiny Seyfor",
    // ticha pravni veta v paticce (Deloitte-style disambiguace)
    legalLead: "Seyfor je skupina samostatných právních osob.",
    legalLinkLabel: "Právní informace a fakturační údaje"
  };

  const panel    = document.getElementById("panel");
  const footProv = document.getElementById("footProvider");
  const modal    = document.getElementById("modal");
  const modalBody= document.getElementById("modalBody");

  /* ---- Brand ikony: inline SVG v Seyfor tokenech (#023444 + #89E103) -----
     Linkovy styl, 24x24, stroke 1.7. Zadne emoji, zadna off-brand cervena. */
  const ICONS = {
    solutions: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 4 7v10l8 4 8-4V7z"/><path d="M4 7l8 4 8-4"/><path d="M12 11v10" stroke="var(--accent)"/></svg>',
    products:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.3"/><rect x="14" y="3" width="7" height="7" rx="1.3" stroke="var(--accent)"/><rect x="3" y="14" width="7" height="7" rx="1.3"/><rect x="14" y="14" width="7" height="7" rx="1.3"/></svg>',
    building:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21V5l8-2 8 2v16"/><path d="M2 21h20"/><path d="M9 9h0M9 13h0M9 17h0M15 9h0M15 13h0M15 17h0" stroke="var(--accent)"/></svg>',
    phone:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h4l2 5-2.5 1.5a11 11 0 0 0 5 5L16 13l5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z"/></svg>',
    email:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>',
    copy:      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>',
    check:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m4 12 5 5L20 6"/></svg>',
    arrow:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>',
    chevron:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>',
    handshake: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="m11 17 2 2a1.5 1.5 0 0 0 2-2"/><path d="m13 19 2 2a1.5 1.5 0 0 0 2-2l-1-1"/><path d="M3 11 8 6l3 1 3-3 7 7"/><path d="m17 14-3-3-3 3-2-2"/></svg>',
    press:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h13v14H6a2 2 0 0 1-2-2z"/><path d="M17 8h2a1 1 0 0 1 1 1v8a2 2 0 0 1-2 2"/><path d="M7 8h7M7 12h7M7 16h4" stroke="var(--accent)"/></svg>'
  };
  function ico(name) { return ICONS[name] || ""; }

  // ---- pomocne ----------------------------------------------------------
  function esc(s) {
    return String(s).replace(/[&<>"]/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  }
  function val(v) {
    if (v === null || v === undefined || v === "")
      return '<span class="placeholder">doplníme k 1.1.2027</span>';
    return esc(v);
  }

  // ---- render tabulky identifikacnich udaju -----------------------------
  function idTableHTML(ent) {
    const assume = ent.assumption
      ? ' <span class="assumption-flag">předpoklad k ověření</span>' : "";
    return ''
      + '<table class="idtable"><tbody>'
      + '<tr><th>IČO</th><td>' + val(ent.ico) + assume + '</td></tr>'
      + '<tr><th>DIČ</th><td>' + val(ent.dic) + '</td></tr>'
      + '<tr><th>Sídlo</th><td>' + val(ent.sidlo) + '</td></tr>'
      + '<tr><th>Datová schránka</th><td>' + val(ent.datovka) + '</td></tr>'
      + '</tbody></table>';
  }
  function entityPlain(ent, brandName) {
    const f = v => (v == null || v === "") ? "doplníme k 1.1.2027" : v;
    const lines = [];
    if (brandName) lines.push("Provozovatelem značky " + brandName + " je " + ent.name + ", součást skupiny Seyfor.");
    lines.push("Smluvní strana: " + ent.name);
    lines.push("IČO: " + f(ent.ico));
    lines.push("DIČ: " + f(ent.dic));
    lines.push("Sídlo: " + f(ent.sidlo));
    lines.push("Datová schránka: " + f(ent.datovka));
    return lines.join("\n");
  }

  // ---- sbalena sekce smluvni strany v karte -----------------------------
  function partyHTML(ent, brandName) {
    const sentence = brandName && brandName !== ent.name
      ? 'Provozovatelem značky <strong>' + esc(brandName) + '</strong> je <strong>'
        + esc(ent.name) + '</strong>, součást skupiny Seyfor.'
      : 'Smluvní stranou je <strong>' + esc(ent.name) + '</strong>, součást skupiny Seyfor.';
    return ''
      + '<div class="party" id="party">'
      +   '<button class="party__toggle" id="partyToggle" aria-expanded="false">'
      +     '<span class="chev" aria-hidden="true">' + ico("chevron") + '</span>'
      +     'Fakturační a identifikační údaje (smluvní strana)'
      +   '</button>'
      +   '<div class="party__body">'
      +     '<p class="party__sentence">' + sentence + '</p>'
      +     idTableHTML(ent)
      +     '<button class="copy-btn" id="copyBtn"><span class="copy-btn__i" aria-hidden="true">' + ico("copy") + '</span>Kopírovat údaje</button>'
      +   '</div>'
      + '</div>';
  }

  // ---- skupinove ucely (M&A, media) na karte matky ----------------------
  function purposesHTML(keys) {
    if (!keys || !keys.length) return "";
    const map = {
      ma:    { icon: "handshake", label: "Prodej nebo přidružení firmy", key: "ma" },
      press: { icon: "press",     label: "Pro novináře a média",         key: "press" }
    };
    let html = '<div class="purposes"><p class="purposes__label">Skupinové kontakty</p><div class="purposes__row">';
    keys.forEach(k => {
      const m = map[k]; if (!m) return;
      html += '<button class="purpose-chip" data-purpose="' + m.key + '">'
            +   '<span class="purpose-chip__i" aria-hidden="true">' + ico(m.icon) + '</span>'
            +   esc(m.label)
            + '</button>';
    });
    html += '</div></div>';
    return html;
  }

  // ---- kontaktni karta --------------------------------------------------
  function cardHTML(cfg) {
    const tierCls = cfg.tier ? " is-" + cfg.tier : "";
    let html = '<div class="contact-card' + tierCls + '"><div class="contact-card__inner">';

    html += '<div class="contact-card__head">';
    if (cfg.logo) {
      html += '<img class="contact-card__logo" src="' + esc(cfg.logo) + '" alt="' + esc(cfg.brandName) + '">';
    } else {
      html += '<span class="brand-badge">' + esc(cfg.brandName) + '</span>';
    }
    html += POWERED + '</div>';

    if (cfg.label) html += '<p class="contact-card__label">' + esc(cfg.label) + '</p>';
    html += '<p class="contact-card__desc">' + esc(cfg.desc) + '</p>';

    if (cfg.pressNote)
      html += '<div class="press-note"><strong>Pozor:</strong> ' + esc(cfg.pressNote) + '</div>';

    html += '<div class="contact-lines">'
      + '<a class="contact-line" href="tel:+420000000000">'
      +   '<span class="ci" aria-hidden="true">' + ico("phone") + '</span>'
      +   '<span>+420 000 000 000'
      +   '<small class="placeholder placeholder--plain">telefonní číslo doplníme k 1.1.2027</small></span></a>'
      + '<a class="contact-line" href="mailto:kontakt@seyfor.com">'
      +   '<span class="ci" aria-hidden="true">' + ico("email") + '</span>'
      +   '<span>kontakt@seyfor.com<small>napište nám</small></span></a>'
      + '</div>';

    html += '<button class="cta" id="ctaBtn">'
          + (cfg.ctaLabel || 'Nezávazná poptávka / kontakt') + '</button>';

    if (cfg.purposes) html += purposesHTML(cfg.purposes);

    if (cfg.showParty)
      html += partyHTML(cfg.ent, cfg.brandForParty || null);

    html += '</div></div>';
    return html;
  }

  // ---- vykresleni karty subjektu ----------------------------------------
  let activeBtn = null;
  function selectSubject(node, ent, btn) {
    if (activeBtn) activeBtn.classList.remove("is-active");
    if (btn) { btn.classList.add("is-active"); activeBtn = btn; }

    const tier = node._tier || "secondary";
    panel.innerHTML = cardHTML({
      tier: tier,
      brandName: node.brandName,
      label: node.label,
      desc: node.desc,
      ent: ent,
      logo: node.logo || null,
      showParty: node.showParty !== false,
      brandForParty: node.brandName !== ent.name ? node.brandName : null,
      purposes: node.purposes || null,
      ctaLabel: "Nezávazná poptávka / kontakt"
    });
    wireCard({ ent: ent, brandName: node.brandName, ctaTitle: "Nezávazná poptávka: " + node.brandName });
    updateFooter(ent, node.brandName !== ent.name ? node.brandName : null);
    panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  // ---- ozivime kartu ----------------------------------------------------
  function wireCard(ctx) {
    const toggle = document.getElementById("partyToggle");
    if (toggle) {
      toggle.addEventListener("click", () => {
        const p = document.getElementById("party");
        const open = p.classList.toggle("is-open");
        toggle.setAttribute("aria-expanded", open ? "true" : "false");
      });
    }
    const copy = document.getElementById("copyBtn");
    if (copy) {
      copy.addEventListener("click", () => {
        const text = entityPlain(ctx.ent, ctx.brandName && ctx.brandName !== ctx.ent.name ? ctx.brandName : null);
        const done = () => {
          copy.innerHTML = '<span class="copy-btn__i" aria-hidden="true">' + ico("check") + '</span>Zkopírováno';
          copy.classList.add("is-done");
          setTimeout(() => {
            copy.innerHTML = '<span class="copy-btn__i" aria-hidden="true">' + ico("copy") + '</span>Kopírovat údaje';
            copy.classList.remove("is-done");
          }, 1800);
        };
        if (navigator.clipboard && navigator.clipboard.writeText)
          navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
        else fallbackCopy(text, done);
      });
    }
    const cta = document.getElementById("ctaBtn");
    if (cta) cta.addEventListener("click", () => openInquiry({ ent: ctx.ent, brandName: ctx.brandName, ctaTitle: ctx.ctaTitle }));

    // skupinove ucely (M&A / media) na karte matky
    document.querySelectorAll(".purpose-chip").forEach(chip => {
      chip.addEventListener("click", () => {
        const g = D.GROUP[chip.dataset.purpose];
        const ent = D.ENTITIES[g.entity];
        const noTruth = chip.dataset.purpose === "press";
        openInquiry({
          ent: ent, brandName: ent.name,
          ctaTitle: chip.dataset.purpose === "ma" ? "Kontakt pro prodej firmy (M&A)" : "Tiskový dotaz",
          noTruthParty: noTruth, pressNote: noTruth ? g.note : null
        });
      });
    });
  }

  function fallbackCopy(text, done) {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); done(); } catch (e) {}
    document.body.removeChild(ta);
  }

  // ---- moment pravdy: poptavkovy formular -------------------------------
  function openInquiry(ctx) {
    const ent = ctx.ent;
    let truth = "";
    if (!ctx.noTruthParty) {
      const sentence = (ctx.brandName && ctx.brandName !== ent.name)
        ? 'Provozovatelem značky <strong>' + esc(ctx.brandName) + '</strong> je <strong>'
          + esc(ent.name) + '</strong>, součást skupiny Seyfor.'
        : 'Smluvní stranou je <strong>' + esc(ent.name) + '</strong>, součást skupiny Seyfor.';
      truth = ''
        + '<div class="truth-block">'
        +   '<p class="truth-block__label">Smluvní strana této poptávky</p>'
        +   '<p class="party__sentence">' + sentence + '</p>'
        +   idTableHTML(ent)
        + '</div>';
    } else {
      truth = '<div class="press-note" style="margin-bottom:18px"><strong>Pozor:</strong> '
        + esc(ctx.pressNote || 'Nejde o fakturační vztah. Tento formulář slouží médiím a tiskovým dotazům.') + '</div>';
    }

    modalBody.innerHTML = ''
      + truth
      + '<div class="form-row"><label>Jméno a příjmení</label><input type="text" placeholder="Vaše jméno"></div>'
      + '<div class="form-row"><label>Firma</label><input type="text" placeholder="Název firmy"></div>'
      + '<div class="form-row"><label>E-mail</label><input type="email" placeholder="vas@email.cz"></div>'
      + '<div class="form-row"><label>Telefon</label><input type="tel" placeholder="+420 …"></div>'
      + '<div class="form-row"><label>Zpráva</label><textarea placeholder="Co potřebujete vyřešit?"></textarea></div>'
      + '<button class="cta" id="sendBtn">Odeslat poptávku</button>'
      + '<p class="form-disclaimer">Prototyp: formulář nic neodesílá. Smluvní strana je zde vidět záměrně a nepřeskočitelně.</p>';

    document.getElementById("modalTitle").textContent = ctx.ctaTitle || "Nezávazná poptávka";
    const send = document.getElementById("sendBtn");
    if (send) send.addEventListener("click", () => { alert("Prototyp: poptávka by se odeslala na smluvní stranu " + ent.name + "."); closeModal(); });
    modal.classList.add("is-open");
  }
  function closeModal() { modal.classList.remove("is-open"); }
  document.getElementById("modalClose").addEventListener("click", closeModal);
  modal.addEventListener("click", e => { if (e.target === modal) closeModal(); });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

  // ---- paticka — most znacka -> firma -----------------------------------
  function updateFooter(ent, brandName) {
    const footLegal = document.getElementById("footLegal");
    const legalLink = ' <a href="#pravni-informace" class="site-foot__legal-link">' + esc(COPY.legalLinkLabel) + '</a>.';

    if (!ent) {
      footProv.innerHTML = 'Provozovatel webu: <strong>Seyfor, a. s.</strong>';
      if (footLegal)
        footLegal.innerHTML = COPY.legalLead
          + ' Provozovatelem tohoto webu je <strong>Seyfor, a. s.</strong> Smluvní strana se liší podle vybrané služby.'
          + legalLink;
      return;
    }
    const icoStr = (ent.ico == null || ent.ico === "")
      ? '<span class="placeholder">IČO doplníme k 1.1.2027</span>' : 'IČO ' + esc(ent.ico);
    const lead = brandName ? 'Provozovatel značky ' + esc(brandName) + ': ' : 'Provozovatel: ';
    footProv.innerHTML = lead + '<strong>' + esc(ent.name) + '</strong> · ' + icoStr;

    // ticha pravni veta — konkretni smluvni strana z lookup dat (PLACEHOLDER zneni)
    if (footLegal) {
      const svc = brandName ? 'služby ' + esc(brandName) : 'této služby';
      footLegal.innerHTML = COPY.legalLead
        + ' Provozovatelem ' + svc + ' a smluvní stranou je <strong>' + esc(ent.name)
        + '</strong>, ' + icoStr + '.'
        + legalLink;
    }
  }

  /* ============== build hierarchie ====================================== */

  // PRIMARNI
  (function buildPrimary() {
    const p = H.primary; p._tier = "primary";
    const btn = document.getElementById("subjPrimary");
    btn.querySelector(".subject__icon").innerHTML = ico(p.icon);
    btn.querySelector(".subject__name").textContent = p.brandName;
    btn.querySelector(".subject__label").textContent = p.label;
    btn.querySelector(".subject__desc").textContent = p.desc;
    btn.querySelector(".subject__arrow").innerHTML = ico("arrow");
    btn.addEventListener("click", () => selectSubject(p, D.ENTITIES[p.key], btn));
  })();

  // SEKUNDARNI
  (function buildSecondary() {
    const wrap = document.getElementById("subjSecondary");
    H.secondary.forEach(s => {
      s._tier = "secondary";
      const btn = document.createElement("button");
      btn.className = "subject subject--secondary";
      btn.innerHTML =
          '<span class="subject__icon" aria-hidden="true">' + ico(s.icon) + '</span>'
        + '<span class="subject__text">'
        +   '<span class="subject__name">' + esc(s.brandName) + '</span>'
        +   '<span class="subject__label">' + esc(s.label) + '</span>'
        +   '<span class="subject__desc">' + esc(s.desc) + '</span>'
        + '</span>'
        + '<span class="subject__arrow" aria-hidden="true">' + ico("arrow") + '</span>';
      btn.addEventListener("click", () => selectSubject(s, D.ENTITIES[s.key], btn));
      wrap.appendChild(btn);
    });
  })();

  // TERCIARNI
  (function buildTertiary() {
    const wrap = document.getElementById("subjTertiary");
    H.tertiary.forEach(t => {
      t._tier = "tertiary";
      const btn = document.createElement("button");
      btn.className = "subject subject--tertiary";
      const head = t.logo
        ? '<img class="subject__logo" src="' + esc(t.logo) + '" alt="' + esc(t.brandName) + '">'
        : '<span class="subject__name">' + esc(t.brandName) + '</span>';
      // endorsement "soucast skupiny Seyfor" — jeden opakovatelny prvek (PLACEHOLDER)
      const endorse = '<span class="subject__endorse">'
        + '<span class="subject__endorse-dot" aria-hidden="true"></span>' + esc(COPY.endorse) + '</span>';
      btn.innerHTML = head
        + '<span class="subject__desc">' + esc(t.desc) + '</span>'
        + endorse;
      btn.addEventListener("click", () => selectSubject(t, D.ENTITIES[t.key], btn));
      wrap.appendChild(btn);
    });
  })();

  updateFooter();
})();
</script>
</body>
</html>
