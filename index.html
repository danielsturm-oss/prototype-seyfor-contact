<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kontakt — Seyfor (prototyp, stav k 1.1.2027)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Hlavicka -->
<header class="site-head">
  <img class="site-head__logo" src="assets/seyfor-logo-white.png" alt="Seyfor"
       onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'SEYFOR',style:'color:#fff;font-weight:700;letter-spacing:2px;font-size:20px'}))">
  <span class="site-head__claim">Prototyp kontaktní sekce · cílový stav k 1.1.2027</span>
</header>

<main class="wrap">

  <section class="hero">
    <h1>Jak vám můžeme pomoci?</h1>
    <p>Vyberte, čeho se váš dotaz týká. Podle volby vám ukážeme správný kontakt i smluvní stranu.</p>
  </section>

  <!-- Prepinac zeme -->
  <div class="country-bar">
    <div class="country-toggle" id="countryToggle" role="tablist" aria-label="Volba země">
      <button data-country="CZ" class="is-active" role="tab">ČR</button>
      <button data-country="SK" role="tab">SK</button>
    </div>
  </div>

  <!-- Router se 4 cestami -->
  <section class="router">
    <div class="router__block-label">Komerční dotaz</div>
    <div class="route-grid">
      <button class="route-card" data-route="solutions">
        <span class="route-card__icon">⚙️</span>
        <span class="route-card__body">
          <span class="route-card__title" data-i18n="solutions-title">Software a služby Seyfor</span>
          <p class="route-card__desc">Implementace, konzultace a rozvoj podnikového softwaru (divize Solutions).</p>
        </span>
        <span class="route-card__arrow">›</span>
      </button>
      <button class="route-card" data-route="products">
        <span class="route-card__icon">🧩</span>
        <span class="route-card__body">
          <span class="route-card__title">Produkty Seyfor</span>
          <p class="route-card__desc">Vyberte konkrétní značku a získejte kontakt i fakturační údaje.</p>
        </span>
        <span class="route-card__arrow">›</span>
      </button>
    </div>

    <div class="router__block-label is-group">Skupina Seyfor</div>
    <div class="route-grid">
      <button class="route-card is-group" data-route="ma">
        <span class="route-card__icon">🤝</span>
        <span class="route-card__body">
          <span class="route-card__title">Prodej nebo přidružení firmy (M&amp;A)</span>
          <p class="route-card__desc">Pro majitele firem, kteří zvažují prodej nebo vstup do skupiny Seyfor.</p>
        </span>
        <span class="route-card__arrow">›</span>
      </button>
      <button class="route-card is-group" data-route="press">
        <span class="route-card__icon">📰</span>
        <span class="route-card__body">
          <span class="route-card__title">Pro novináře a média</span>
          <p class="route-card__desc">Tiskový a PR kontakt skupiny Seyfor.</p>
        </span>
        <span class="route-card__arrow">›</span>
      </button>
    </div>
  </section>

  <!-- Vystupni panel: produktovy vyber + kontaktni karta -->
  <section class="panel" id="panel"></section>

</main>

<!-- Paticka — meni se podle vybrane znacky/sekce -->
<footer class="site-foot">
  <div class="site-foot__inner">
    <div class="site-foot__provider" id="footProvider">
      Provozovatel webu: <strong>Seyfor, a. s.</strong>
    </div>
    <img src="assets/seyfor-logo-white.png" alt="Seyfor"
         onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'SEYFOR',style:'color:#fff;font-weight:700;letter-spacing:2px'}))">
  </div>
</footer>

<!-- Modal: poptavkovy formular (moment pravdy) -->
<div class="modal-backdrop" id="modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal__head">
      <h3 id="modalTitle">Nezávazná poptávka</h3>
      <button class="modal__close" id="modalClose" aria-label="Zavřít">×</button>
    </div>
    <div class="modal__body" id="modalBody"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
/* =======================================================================
   Seyfor kontaktni sekce — aplikacni logika prototypu
   Vse cte z window.SEYFOR_DATA (data.js). Zadny hardcode udaju zde.
   ======================================================================= */
(function () {
  const D = window.SEYFOR_DATA;
  const POWERED = '<span class="powered">Powered by Seyfor</span>';

  const state = { country: "CZ", route: null, brandSlug: null };

  const panel    = document.getElementById("panel");
  const footProv = document.getElementById("footProvider");
  const modal    = document.getElementById("modal");
  const modalBody= document.getElementById("modalBody");

  // ---- pomocne ----------------------------------------------------------
  function esc(s) {
    return String(s).replace(/[&<>"]/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  }
  // vrati hodnotu nebo oznaceny placeholder (nikdy prazdne)
  function val(v) {
    if (v === null || v === undefined || v === "")
      return '<span class="placeholder">doplníme k 1.1.2027</span>';
    return esc(v);
  }
  // vyber smluvni strany pro znacku dle zeme; fallback na druhou zemi
  function entityForBrand(brand, country) {
    const p = brand.provider;
    let key = p[country];
    if (!key) key = p[country === "CZ" ? "SK" : "CZ"]; // znacka jen v jedne zemi
    return key ? { key, ent: D.ENTITIES[key], onlyOtherCountry: !p[country] } : null;
  }

  // ---- render tabulky identifikacnich udaju -----------------------------
  function idTableHTML(ent) {
    const assume = ent.assumption
      ? ' <span class="assumption-flag">předpoklad k ověření</span>' : "";
    return ''
      + '<table class="idtable"><tbody>'
      + '<tr><th>IČO</th><td>' + val(ent.ico) + assume + '</td></tr>'
      + '<tr><th>DIČ</th><td>' + val(ent.dic) + '</td></tr>'
      + '<tr><th>Sídlo</th><td>' + val(ent.sidlo) + '</td></tr>'
      + '<tr><th>Datová schránka</th><td>' + val(ent.datovka) + '</td></tr>'
      + '</tbody></table>';
  }
  // plain text pro copy-to-clipboard
  function entityPlain(ent, brandName) {
    const f = v => (v == null || v === "") ? "doplníme k 1.1.2027" : v;
    const lines = [];
    if (brandName) lines.push("Provozovatelem značky " + brandName + " je " + ent.name + ", součást skupiny Seyfor.");
    lines.push("Smluvní strana: " + ent.name);
    lines.push("IČO: " + f(ent.ico));
    lines.push("DIČ: " + f(ent.dic));
    lines.push("Sídlo: " + f(ent.sidlo));
    lines.push("Datová schránka: " + f(ent.datovka));
    return lines.join("\n");
  }

  // ---- sbalena/rozbalena sekce smluvni strany v karte -------------------
  function partyHTML(ent, brandName) {
    const sentence = brandName
      ? 'Provozovatelem značky <strong>' + esc(brandName) + '</strong> je <strong>'
        + esc(ent.name) + '</strong>, součást skupiny Seyfor.'
      : 'Smluvní stranou je <strong>' + esc(ent.name) + '</strong>, součást skupiny Seyfor.';
    return ''
      + '<div class="party" id="party">'
      +   '<button class="party__toggle" id="partyToggle" aria-expanded="false">'
      +     '<span class="chev">▾</span> Fakturační a identifikační údaje (smluvní strana)'
      +   '</button>'
      +   '<div class="party__body">'
      +     '<p class="party__sentence">' + sentence + '</p>'
      +     idTableHTML(ent)
      +     '<button class="copy-btn" id="copyBtn">📋 Kopírovat údaje</button>'
      +   '</div>'
      + '</div>';
  }

  // ---- kontaktni karta --------------------------------------------------
  // cfg: { groupStyle, brandName, ent, desc, pressNote, isInvoicing, showParty,
  //        forceContractPartyRow, brandForParty }
  function cardHTML(cfg) {
    const groupCls = cfg.groupStyle ? " is-group" : "";
    const ctaCls   = cfg.groupStyle ? " is-group" : "";
    let html = '<div class="contact-card' + groupCls + '"><div class="contact-card__inner">';

    html += '<div class="contact-card__head">'
          +   '<span class="brand-badge">' + esc(cfg.brandName) + '</span>'
          +   POWERED
          + '</div>';

    html += '<p class="contact-card__desc">' + esc(cfg.desc) + '</p>';

    if (cfg.pressNote)
      html += '<div class="press-note"><strong>Pozor:</strong> ' + esc(cfg.pressNote) + '</div>';

    // tap-to-call / tap-to-mail (demo kontakty)
    html += '<div class="contact-lines">'
      + '<a class="contact-line" href="tel:+420000000000">'
      +   '<span class="ci">📞</span><span>+420 000 000 000'
      +   '<small class="placeholder" style="background:none;padding:0">telefonní číslo doplníme k 1.1.2027</small></span></a>'
      + '<a class="contact-line" href="mailto:kontakt@seyfor.com">'
      +   '<span class="ci">✉️</span><span>kontakt@seyfor.com'
      +   '<small>napište nám</small></span></a>'
      + '</div>';

    html += '<button class="cta' + ctaCls + '" id="ctaBtn">'
          + (cfg.ctaLabel || 'Nezávazná poptávka / kontakt') + '</button>';

    // sbalena sekce smluvni strany (M&A ma, tisk ne)
    if (cfg.showParty)
      html += partyHTML(cfg.ent, cfg.brandForParty || null);

    html += '</div></div>';
    return html;
  }

  // ---- vykresleni podle cesty -------------------------------------------
  function renderRoute() {
    panel.innerHTML = "";
    const r = state.route;
    if (!r) { updateFooter(); return; }

    if (r === "solutions") {
      const s = D.SOLUTIONS[state.country];
      const ent = D.ENTITIES[s.entity];
      panel.innerHTML = cardHTML({
        groupStyle: false,
        brandName: s.label,
        desc: s.desc,
        ent: ent,
        showParty: true,
        brandForParty: null,
        ctx: "solutions"
      });
      wireCard({ ent, brandName: s.label, groupStyle: false });
      updateFooter(ent);

    } else if (r === "products") {
      renderProductPicker();

    } else if (r === "ma") {
      const g = D.GROUP.ma;
      const ent = D.ENTITIES[g.entity];
      panel.innerHTML = cardHTML({
        groupStyle: true,
        brandName: ent.name,
        desc: g.desc,
        ent: ent,
        showParty: true,             // M&A MA radek smluvni strany
        brandForParty: null,
        ctaLabel: "Ozvat se akvizičnímu týmu"
      });
      wireCard({ ent, brandName: ent.name, groupStyle: true, ctaTitle: "Kontakt pro M&A / prodej firmy" });
      updateFooter(ent);

    } else if (r === "press") {
      const g = D.GROUP.press;
      const ent = D.ENTITIES[g.entity];
      panel.innerHTML = cardHTML({
        groupStyle: true,
        brandName: ent.name + " — tiskové oddělení",
        desc: g.desc,
        ent: ent,
        pressNote: g.note,
        showParty: false,            // tisk NEMA fakturacni vztah
        ctaLabel: "Napsat tiskovému oddělení"
      });
      wireCard({ ent, brandName: ent.name, groupStyle: true, noTruthParty: true, ctaTitle: "Tiskový dotaz" });
      updateFooter(ent);
    }
    panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  // ---- produktovy vyber (search + dlazdice) -----------------------------
  function renderProductPicker() {
    panel.innerHTML = ''
      + '<div class="product-picker">'
      +   '<h3>Produkty Seyfor</h3>'
      +   '<p class="hint">Najděte svou značku. Karta i fakturační údaje se přizpůsobí zemi (' + esc(state.country) + ').</p>'
      +   '<input class="product-search" id="brandSearch" type="text" placeholder="Hledat značku (např. Money, Dotykačka, Fleetware)…" autocomplete="off">'
      +   '<div class="tile-grid" id="tileGrid"></div>'
      + '</div>'
      + '<div id="brandCard"></div>';

    const search = document.getElementById("brandSearch");
    search.addEventListener("input", () => drawTiles(search.value));
    drawTiles("");
    if (state.brandSlug) drawBrandCard(state.brandSlug);
  }

  function drawTiles(q) {
    const grid = document.getElementById("tileGrid");
    const needle = q.trim().toLowerCase();
    const list = D.BRANDS.filter(b =>
      !needle || b.name.toLowerCase().includes(needle) || b.desc.toLowerCase().includes(needle));
    if (!list.length) { grid.innerHTML = '<div class="tile-empty">Nic nenalezeno. Zkuste jiný název.</div>'; return; }
    grid.innerHTML = list.map(b =>
      '<button class="tile' + (b.slug === state.brandSlug ? ' is-active' : '') + '" data-brand="' + b.slug + '">'
      + '<span class="tile__name">' + esc(b.name) + '</span>'
      + '<span class="tile__desc">' + esc(b.desc) + '</span></button>').join("");
    grid.querySelectorAll(".tile").forEach(t =>
      t.addEventListener("click", () => { state.brandSlug = t.dataset.brand; drawTiles(q); drawBrandCard(state.brandSlug); }));
  }

  function drawBrandCard(slug) {
    const brand = D.BRANDS.find(b => b.slug === slug);
    const wrap = document.getElementById("brandCard");
    if (!brand) { wrap.innerHTML = ""; return; }
    const res = entityForBrand(brand, state.country);
    const ent = res.ent;

    let desc = brand.desc;
    if (res.onlyOtherCountry)
      desc += " (Tato značka má v zemi " + state.country + " smluvní stranu z druhé země portfolia.)";

    wrap.innerHTML = cardHTML({
      groupStyle: false,
      brandName: brand.name,
      desc: desc,
      ent: ent,
      showParty: true,
      brandForParty: brand.name
    });
    wireCard({ ent, brandName: brand.name, groupStyle: false });
    updateFooter(ent, brand.name);
    wrap.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  // ---- ozivime karty: rozbaleni smluvni strany, copy, CTA ---------------
  function wireCard(ctx) {
    const toggle = document.getElementById("partyToggle");
    if (toggle) {
      toggle.addEventListener("click", () => {
        const p = document.getElementById("party");
        const open = p.classList.toggle("is-open");
        toggle.setAttribute("aria-expanded", open ? "true" : "false");
      });
    }
    const copy = document.getElementById("copyBtn");
    if (copy) {
      copy.addEventListener("click", () => {
        const text = entityPlain(ctx.ent, ctx.brandName && ctx.brandName !== ctx.ent.name ? ctx.brandName : null);
        const done = () => { copy.textContent = "✓ Zkopírováno"; copy.classList.add("is-done");
          setTimeout(() => { copy.textContent = "📋 Kopírovat údaje"; copy.classList.remove("is-done"); }, 1800); };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
        } else fallbackCopy(text, done);
      });
    }
    const cta = document.getElementById("ctaBtn");
    if (cta) cta.addEventListener("click", () => openInquiry(ctx));
  }

  function fallbackCopy(text, done) {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); done(); } catch (e) {}
    document.body.removeChild(ta);
  }

  // ---- moment pravdy: poptavkovy formular -------------------------------
  function openInquiry(ctx) {
    const ent = ctx.ent;
    const isGroup = ctx.groupStyle;
    let truth = "";
    if (!ctx.noTruthParty) {
      const sentence = (ctx.brandName && ctx.brandName !== ent.name)
        ? 'Provozovatelem značky <strong>' + esc(ctx.brandName) + '</strong> je <strong>'
          + esc(ent.name) + '</strong>, součást skupiny Seyfor.'
        : 'Smluvní stranou je <strong>' + esc(ent.name) + '</strong>, součást skupiny Seyfor.';
      truth = ''
        + '<div class="truth-block">'
        +   '<p class="truth-block__label' + (isGroup ? ' is-group' : '') + '">Smluvní strana této poptávky</p>'
        +   '<p class="party__sentence">' + sentence + '</p>'
        +   idTableHTML(ent)
        + '</div>';
    } else {
      truth = '<div class="press-note" style="margin-bottom:18px"><strong>Pozor:</strong> '
        + 'Nejde o fakturační vztah. Tento formulář slouží médiím a tiskovým dotazům.</div>';
    }

    modalBody.innerHTML = ''
      + truth
      + '<div class="form-row"><label>Jméno a příjmení</label><input type="text" placeholder="Vaše jméno"></div>'
      + '<div class="form-row"><label>Firma</label><input type="text" placeholder="Název firmy"></div>'
      + '<div class="form-row"><label>E-mail</label><input type="email" placeholder="vas@email.cz"></div>'
      + '<div class="form-row"><label>Telefon</label><input type="tel" placeholder="+420 …"></div>'
      + '<div class="form-row"><label>Zpráva</label><textarea placeholder="Co potřebujete vyřešit?"></textarea></div>'
      + '<button class="cta' + (isGroup ? ' is-group' : '') + '" id="sendBtn">Odeslat poptávku</button>'
      + '<p class="form-disclaimer">Prototyp — formulář nic neodesílá. Smluvní strana je zde vidět záměrně a nepřeskočitelně.</p>';

    document.getElementById("modalTitle").textContent = ctx.ctaTitle || "Nezávazná poptávka";
    const send = document.getElementById("sendBtn");
    if (send) send.addEventListener("click", () => { alert("Prototyp: poptávka by se odeslala na smluvní stranu " + ent.name + "."); closeModal(); });
    modal.classList.add("is-open");
  }
  function closeModal() { modal.classList.remove("is-open"); }
  document.getElementById("modalClose").addEventListener("click", closeModal);
  modal.addEventListener("click", e => { if (e.target === modal) closeModal(); });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

  // ---- paticka — most znacka -> firma -----------------------------------
  function updateFooter(ent, brandName) {
    if (!ent) {
      footProv.innerHTML = 'Provozovatel webu: <strong>Seyfor, a. s.</strong>';
      return;
    }
    const ico = (ent.ico == null || ent.ico === "")
      ? '<span class="placeholder">IČO doplníme k 1.1.2027</span>' : 'IČO ' + esc(ent.ico);
    const lead = brandName ? 'Provozovatel značky ' + esc(brandName) + ': ' : 'Provozovatel: ';
    footProv.innerHTML = lead + '<strong>' + esc(ent.name) + '</strong> · ' + ico;
  }

  // ---- prepinani cesty / zeme -------------------------------------------
  document.querySelectorAll(".route-card").forEach(card => {
    card.addEventListener("click", () => {
      document.querySelectorAll(".route-card").forEach(c => c.classList.remove("is-active"));
      card.classList.add("is-active");
      state.route = card.dataset.route;
      if (state.route !== "products") state.brandSlug = null;
      renderRoute();
    });
  });

  document.getElementById("countryToggle").querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("#countryToggle button").forEach(b => b.classList.remove("is-active"));
      btn.classList.add("is-active");
      state.country = btn.dataset.country;
      // prekresli aktualni cestu/kartu dle nove zeme
      renderRoute();
    });
  });

  updateFooter();
})();
</script>
</body>
</html>
